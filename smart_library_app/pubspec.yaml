publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  animate_do: ^5.1.0
  http: ^1.6.0
  flutter_riverpod: ^3.3.2
  image_picker: ^1.1.2
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0
  google_fonts: ^8.1.0
  cached_network_image: ^3.4.1
  flutter_dotenv: ^5.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
